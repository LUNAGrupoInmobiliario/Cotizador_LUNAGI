<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Tabiraíces — Sistema de Cotizaciones</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f3ef;--surface:#fff;--surface2:#f0efe9;--border:#d0cfc9;--text:#1a1a1a;--muted:#666;--inp:#fff;--inp-bd:#d0cfc9;--navy:#0D1B2A;--navy2:#162336;--gold:#F5C010;--gold2:#E0A800;--r:10px;--div:#e8e7e1;--bp-bg:#fef3c7;--bp-c:#92400e;--bs-bg:#dbeafe;--bs-c:#1e40af;--bpa-bg:#d1fae5;--bpa-c:#065f46;--del-bg:#fee2e2;--del-c:#b91c1c;}
body.dark{--bg:#080e18;--surface:#0f1a28;--surface2:#0a1220;--border:#1a2d42;--text:#dce8f5;--muted:#7a95b0;--inp:#0d1825;--inp-bd:#1e3350;--div:#1a2d42;--bp-bg:#3a2800;--bp-c:#fbbf24;--bs-bg:#0c1e3a;--bs-c:#60a5fa;--bpa-bg:#0a2a1a;--bpa-c:#34d399;--del-bg:#2a0f0f;--del-c:#f87171;}
body{font-family:Montserrat,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
.nav{background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px;position:sticky;top:0;z-index:100;gap:10px}
.nav-brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-logo{height:48px;width:auto}
.nav-txt .nt{font-size:17px;font-weight:900;color:#fff;letter-spacing:1.5px;text-transform:uppercase;line-height:1.1}
.nav-txt .ns{font-size:8.5px;color:var(--gold);font-weight:700;letter-spacing:.7px;text-transform:uppercase}
.nav-r{display:flex;align-items:center;gap:7px;flex-shrink:0}
.tog{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}.tog:hover{background:rgba(255,255,255,.18)}
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:8px;font-size:11px;font-weight:800;cursor:pointer;border:none;transition:all .15s;font-family:Montserrat,sans-serif;white-space:nowrap;text-transform:uppercase;letter-spacing:.6px}
.bg{background:var(--gold);color:var(--navy)}.bg:hover{background:var(--gold2)}.bg:disabled{opacity:.6;cursor:default}
.bn{background:var(--navy);color:#fff}.bn:hover{background:var(--navy2)}
.bo{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.3)}.bo:hover{background:rgba(255,255,255,.1)}
.bgh{background:var(--surface);color:var(--text);border:1.5px solid var(--border)}.bgh:hover{background:var(--surface2)}
.bsm{padding:6px 11px;font-size:10px}
.dbtn{width:30px;height:30px;border-radius:6px;border:none;background:var(--del-bg);color:var(--del-c);cursor:pointer;font-size:16px;font-weight:900;display:flex;align-items:center;justify-content:center}.dbtn:hover{opacity:.8}
.page{max-width:1040px;margin:0 auto;padding:22px 18px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.sc{background:var(--surface);border-radius:var(--r);padding:14px 16px;border:1px solid var(--border);transition:background .3s,border .3s}
.sl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.sv{font-size:26px;font-weight:900;color:var(--text);letter-spacing:-.5px}.sv.gold{color:var(--gold2)}
.stit{font-size:20px;font-weight:900;color:var(--text);letter-spacing:.5px;margin-bottom:2px;text-transform:uppercase}
.ssub{font-size:12px;color:var(--muted);margin-bottom:16px;font-weight:500}
.ql{display:flex;flex-direction:column;gap:8px}
.qc{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:13px 16px;transition:background .3s,border .3s,box-shadow .15s}.qc:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.qct{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.qm{flex:1;min-width:0}
.qn{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:2px}
.qcl{font-size:15px;font-weight:800;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qpr{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qr{text-align:right;flex-shrink:0}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:9px;font-weight:800;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.bp{background:var(--bp-bg);color:var(--bp-c)}.bs{background:var(--bs-bg);color:var(--bs-c)}.bpa{background:var(--bpa-bg);color:var(--bpa-c)}
.qtot{font-size:22px;font-weight:900;color:var(--text);line-height:1;letter-spacing:-.5px}
.qca{display:flex;gap:6px;align-items:center;padding-top:10px;border-top:1px solid var(--div);flex-wrap:wrap}
/* STATUS DROPDOWN */
.st-wrap{position:relative;flex-shrink:0}
.st-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:8px;font-size:10px;font-weight:800;cursor:pointer;border:1.5px solid transparent;font-family:Montserrat,sans-serif;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;transition:all .15s}
.st-btn.bp{background:var(--bp-bg);color:var(--bp-c);border-color:var(--bp-c)}
.st-btn.bs{background:var(--bs-bg);color:var(--bs-c);border-color:var(--bs-c)}
.st-btn.bpa{background:var(--bpa-bg);color:var(--bpa-c);border-color:var(--bpa-c)}
.st-btn:hover{filter:brightness(1.08)}
.st-drop{position:absolute;bottom:calc(100% + 6px);left:0;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;z-index:99;box-shadow:0 6px 20px rgba(0,0,0,.15);min-width:140px;animation:fdrop .12s ease}
@keyframes fdrop{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.st-opt{padding:9px 14px;font-size:10px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:7px;transition:background .1s}
.st-opt:hover{filter:brightness(.95)}
.st-opt.bp{background:var(--bp-bg);color:var(--bp-c)}
.st-opt.bs{background:var(--bs-bg);color:var(--bs-c)}
.st-opt.bpa{background:var(--bpa-bg);color:var(--bpa-c)}
.st-opt+.st-opt{border-top:1px solid var(--div)}
.empty{background:var(--surface);border-radius:var(--r);border:1.5px dashed var(--border);padding:48px 20px;text-align:center;color:var(--muted)}
/* STATS ESPECIALES */
.sc.income{border-color:var(--bpa-c)!important;background:var(--bpa-bg)!important}
.sc.income .sl{color:var(--bpa-c)}
.sc.income .sv{color:var(--bpa-c)}
.sc.pend-card{border-color:var(--bp-c)!important;background:var(--bp-bg)!important}
.sc.pend-card .sl{color:var(--bp-c)}
.sc.pend-card .sv{color:var(--bp-c)}
.sc.sent-card{border-color:var(--bs-c)!important;background:var(--bs-bg)!important}
.sc.sent-card .sl{color:var(--bs-c)}
.sc.sent-card .sv{color:var(--bs-c)}
/* FILTERS */
.filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.flt{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-family:Montserrat,sans-serif;transition:all .15s;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.flt:hover{border-color:var(--navy);color:var(--navy)}
.flt.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.flt.active.f-pend{background:var(--bp-c);border-color:var(--bp-c);color:#fff}
.flt.active.f-sent{background:var(--bs-c);border-color:var(--bs-c);color:#fff}
.flt.active.f-paid{background:var(--bpa-c);border-color:var(--bpa-c);color:#fff}
.flt-cnt{background:rgba(255,255,255,.25);border-radius:10px;padding:1px 7px;font-size:10px;font-weight:900}
.flt:not(.active) .flt-cnt{background:var(--surface2);color:var(--muted)}
.empty-flt{background:var(--surface);border-radius:var(--r);border:1.5px dashed var(--border);padding:36px 20px;text-align:center;color:var(--muted)}
.panel{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;transition:background .3s,border .3s}
.ph{background:var(--navy);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.pht{font-size:15px;font-weight:900;color:#fff;letter-spacing:1px;text-transform:uppercase}
.pb{padding:20px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:16px}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.fc{padding:8px 10px;border:1.5px solid var(--inp-bd);border-radius:7px;font-family:Montserrat,sans-serif;font-size:13px;color:var(--text);background:var(--inp);transition:border .15s,background .3s,color .3s;width:100%}
.fc:focus{outline:none;border-color:var(--gold2)}
hr.dv{border:none;border-top:1.5px solid var(--div);margin:16px 0}
.ih{display:grid;grid-template-columns:3fr 1fr 1fr 1fr 32px;gap:6px;padding:6px 0;border-bottom:2px solid var(--navy);font-size:9px;font-weight:800;color:var(--text);text-transform:uppercase;letter-spacing:.7px}
.ir{display:grid;grid-template-columns:3fr 1fr 1fr 1fr 32px;gap:6px;padding:6px 0;border-bottom:1px solid var(--div);align-items:center}
.ir input{padding:6px 8px;border:1.5px solid var(--inp-bd);border-radius:6px;font-family:Montserrat,sans-serif;font-size:12px;color:var(--text);width:100%;background:var(--inp);transition:background .3s,color .3s}
.ir input:focus{outline:none;border-color:var(--gold2)}
.it{font-weight:800;font-size:12px;color:var(--text);text-align:right}
.ab{display:flex;align-items:center;gap:5px;padding:7px 12px;border:1.5px dashed var(--border);border-radius:7px;background:transparent;cursor:pointer;color:var(--muted);font-size:10px;font-weight:700;transition:all .15s;margin-top:8px;font-family:Montserrat,sans-serif;text-transform:uppercase;letter-spacing:.5px}
.ab:hover{border-color:var(--gold2);color:var(--gold2)}
.tb{background:var(--surface2);border-radius:var(--r);padding:13px 16px;margin-top:16px;transition:background .3s}
.tr{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:13px}
.tr.g{padding-top:9px;margin-top:7px;border-top:2px solid var(--navy)}
.tl{color:var(--muted);font-weight:600}.tv{font-weight:800;color:var(--text)}
.tr.g .tl{font-size:14px;font-weight:900;color:var(--text);text-transform:uppercase;letter-spacing:.5px}
.tr.g .tv{font-size:24px;font-weight:900;color:var(--text)}
.pw{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;transition:background .3s,border .3s}
.phd{background:var(--navy);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.pct{background:var(--navy2);padding:8px 24px;display:flex;gap:20px;flex-wrap:wrap}
.ci{font-size:10px;color:rgba(255,255,255,.6)}.ci span{color:#fff}
.pbdy{padding:20px 24px}
.pcg{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--navy);border-radius:var(--r);overflow:hidden;margin-bottom:18px}
.pcc{padding:11px 14px}.pcc+.pcc{border-left:1px solid rgba(255,255,255,.1)}
.pcl{font-size:8px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.pcv{font-size:12px;font-weight:800;color:#fff}
.ptbl{width:100%;border-collapse:collapse;margin-bottom:16px}
.ptbl th{background:var(--navy);color:#fff;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:8px 11px;text-align:left}
.ptbl th:last-child,.ptbl td:last-child{text-align:right}
.ptbl td{padding:8px 11px;font-size:12px;border-bottom:1px solid var(--div);color:var(--text)}
.ptbl tr:nth-child(even) td{background:var(--surface2)}
.ptots{display:flex;justify-content:flex-end;margin-bottom:20px}
.ptb{min-width:230px}
.ptr{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;color:var(--text);font-weight:600}
.ptg{background:var(--gold);border-radius:8px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.ptgl{font-size:12px;font-weight:900;color:var(--navy);text-transform:uppercase;letter-spacing:1px}
.ptgv{font-size:22px;font-weight:900;color:var(--navy)}
.sa{display:flex;align-items:flex-end;justify-content:space-between;padding-top:12px;border-top:1px solid var(--div);margin-bottom:18px}
.bks{background:var(--navy);border-radius:var(--r);overflow:hidden;margin-top:16px}
.bkh{background:rgba(0,0,0,.3);padding:8px 16px;display:flex;align-items:center;gap:7px;border-bottom:1px solid rgba(255,255,255,.08)}
.bkht{font-size:9px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:1.2px}
.bkg{display:grid;grid-template-columns:1fr 1fr 1fr}
.bkc{padding:12px 14px;border-right:1px solid rgba(255,255,255,.07)}.bkc:last-child{border-right:none}
.bki{width:32px;height:32px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;margin-bottom:7px}
.bkl{font-size:8px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px}
.bks2{font-size:9px;color:rgba(255,255,255,.5);margin-bottom:2px}
.bkn{font-size:11px;font-weight:800;color:#fff;letter-spacing:.4px}
.bkb{padding:9px 16px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:9px}
.bkbi{width:27px;height:27px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.bkbl{font-size:8px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.7px}
.bkbn{font-size:12px;font-weight:800;color:#fff}
.svc{background:var(--navy2);border-radius:var(--r);margin-top:8px;padding:11px 18px;display:flex;align-items:center;justify-content:space-around;gap:6px}
.svci{display:flex;align-items:center;gap:7px}
.svcl{font-size:8px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;line-height:1.5}
.svcd{width:1px;height:24px;background:rgba(255,255,255,.15)}
.pft{background:var(--navy);padding:22px 28px;display:flex;align-items:center;justify-content:space-between}
.pfm{font-size:14px;color:var(--gold);font-weight:900;text-transform:uppercase;letter-spacing:.8px}
.pfs{font-size:12px;color:rgba(255,255,255,.5);margin-top:5px;font-weight:500}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:-1px}
</style>
</head>

async function downloadPDF(qi){

  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> Generando...';}

            Folio automático · consecutivo
          </div>
          <input id="q-date" type="date" class="fc" style="width:136px;font-size:12px" value="${q.date}"/></div></div><hr class="dv"/><div class="fg2"><div class="fg"><label class="fl">Cliente</label><input id="q-client" class="fc" placeholder="Nombre completo" value="${q.client}"/></div><div class="fg"><label class="fl">Forma de Pago</label><input id="q-payment" class="fc" placeholder="Efectivo, transferencia…" value="${q.payment}"/></div><div class="fg"><label class="fl">Proyecto / Obra</label><input id="q-project" class="fc" placeholder="Nombre del proyecto" value="${q.project}"/></div><div class="fg"><label class="fl">Ubicación de Entrega</label><input id="q-location" class="fc" placeholder="Colonia, calle…" value="${q.location}"/></div></div><hr class="dv"/><div class="ih"><div>Descripción</div><div>Precio Unit.</div><div>Cantidad</div><div style="text-align:right">Total</div><div></div></div>${q.items.map((item,i)=>`<div class="ir"><input id="item-desc-${i}" placeholder="Tabique pesado…" value="${item.desc}"/><input id="item-unit-${i}" type="number" placeholder="0.00" value="${item.unit}" step="0.01" min="0"/><input id="item-qty-${i}" type="number" placeholder="0" value="${item.qty}" min="0"/><div class="it" id="it-${i}">${fmt((parseFloat(item.unit)||0)*(parseFloat(item.qty)||0))}</div><button class="dbtn" onclick="remItem(${i})">×</button></div>`).join('')}<button class="ab" onclick="addItem()">+ Agregar producto</button><div style="display:flex;align-items:center;gap:10px;margin-top:13px"><label class="fl" style="white-space:nowrap">IVA:</label><select id="q-iva" class="fc" style="width:175px"><option value="0" ${(q.ivaRate||0)==0?'selected':''}>0% — Sin IVA</option><option value="16" ${(q.ivaRate||0)==16?'selected':''}>16% — IVA estándar</option></select></div><div class="tb"><div class="tr"><span class="tl">Subtotal</span><span class="tv" id="t-sub">${fmt(st)}</span></div><div class="tr"><span class="tl">IVA (${q.ivaRate||0}%)</span><span class="tv" id="t-iva">${fmt(iv)}</span></div><div class="tr g"><span class="tl">TOTAL</span><span class="tv" id="t-tot">${fmt(tot)}</span></div></div></div></div>`;}
function renderPreview(){
  const q=cq;const st=sub(q.items),iv=st*(q.ivaRate||0)/100,tot=st+iv;const i=quotes.findIndex(x=>x.id===q.id);
  return`<div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap"><button class="btn bgh bsm" onclick="showView('list')">← Volver</button>${i>=0?`<button id="pdfbtn-${i}" class="btn bn" onclick="downloadPDF(${i})" style="padding:9px 20px">Descargar PDF</button>`:''}</div><div class="pw"><div class="phd"><div style="display:flex;align-items:center;gap:11px">${bSVG(50)}<div><div style="font-size:22px;font-weight:900;letter-spacing:1.5px;color:#fff;line-height:1;text-transform:uppercase">Tabiraíces</div><div style="font-size:9px;color:var(--gold);font-weight:700;letter-spacing:.5px;text-transform:uppercase">La base de toda buena obra</div></div></div><div style="text-align:right"><div style="font-size:9px;color:rgba(255,255,255,.4);font-weight:700;text-transform:uppercase">Factura Nro.</div><div style="font-size:28px;font-weight:900;color:var(--gold)">#${q.id}</div><div style="font-size:10px;color:rgba(255,255,255,.6)">Fecha: ${q.date}</div></div></div><div class="pct"><div class="ci">Tel: <span>954 100 4104 / 954 138 9557</span></div><div class="ci">Dir: <span>Ventanilla Colotepec</span></div><div class="ci">Email: <span>bloquera.tabiraices@gmail.com</span></div></div><div class="pbdy"><div class="pcg"><div class="pcc"><div class="pcl">Cliente</div><div class="pcv">${q.client||'—'}</div></div><div class="pcc"><div class="pcl">Proyecto / Obra</div><div class="pcv">${q.project||'—'}</div></div><div class="pcc"><div class="pcl">Entrega en</div><div class="pcv">${q.location||'—'}</div></div></div><table class="ptbl"><thead><tr><th>Descripción</th><th>Precio Unitario</th><th>Cantidad</th><th>Total</th></tr></thead><tbody>${q.items.filter(it=>it.desc||it.qty).map(it=>`<tr><td>${it.desc||'—'}</td><td>${fmt(parseFloat(it.unit)||0)}</td><td>${parseInt(it.qty)||0}</td><td style="font-weight:800">${fmt((parseFloat(it.unit)||0)*(parseFloat(it.qty)||0))}</td></tr>`).join('')}</tbody></table><div class="ptots"><div class="ptb"><div class="ptr"><span style="color:var(--muted)">Subtotal</span><span style="font-weight:800">${fmt(st)}</span></div><div class="ptr"><span style="color:var(--muted)">IVA (${q.ivaRate||0}%)</span><span style="font-weight:800">${fmt(iv)}</span></div><div class="ptg"><span class="ptgl">TOTAL</span><span class="ptgv">${fmt(tot)}</span></div></div></div><div class="sa"><div style="font-size:12px;color:var(--muted)">Forma de pago: <strong style="color:var(--text)">${q.payment||'—'}</strong></div><div style="text-align:center"><div style="width:155px;border-top:1.5px solid var(--navy);padding-top:5px;font-size:10px;color:var(--muted)">${q.client||''}</div><div style="font-size:9px;color:var(--muted);margin-top:2px">Firma / Aceptación del cliente</div></div></div>${bankHTML()}</div>${footerHTML()}</div>`;}
function changeStatus(i,s,e){
  if(e)e.stopPropagation();
  quotes[i].status=s;
  render();
}
function toggleDrop(i,e){
  if(e)e.stopPropagation();
  document.querySelectorAll('.st-drop').forEach(d=>{if(d.id!=='sd-'+i)d.style.display='none';});
  const d=document.getElementById('sd-'+i);
  if(d)d.style.display=d.style.display==='none'||!d.style.display?'block':'none';
}
document.addEventListener('click',()=>document.querySelectorAll('.st-drop').forEach(d=>d.style.display='none'));
function render(){
  const app=document.getElementById('app');
  if(view==='list')app.innerHTML=renderList();
  else if(view==='form'){app.innerHTML=renderForm();setTimeout(()=>attachL(),0);}
  else if(view==='preview')app.innerHTML=renderPreview();
}
render();

</script>
</body>
</html>
